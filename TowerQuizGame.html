<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Quiz Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes waveFlow {
            0% {
                background-position: 0% 0%;
            }
            50% {
                background-position: 100% 100%;
            }
            100% {
                background-position: 0% 0%;
            }
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg,
                #FF0000 0%,
                #FF7F00 8%,
                #FFFF00 16%,
                #00FF00 24%,
                #0000FF 32%,
                #4B0082 40%,
                #9400D3 48%,
                #FF0000 56%,
                #FF7F00 64%,
                #FFFF00 72%,
                #00FF00 80%,
                #0000FF 88%,
                #4B0082 96%,
                #9400D3 100%);
            background-size: 200% 200%;
            animation: waveFlow 8s ease-in-out infinite;
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
        }

        header {
            position: relative;
            background-color: rgba(0, 0, 0, 0.2);
            border-bottom: 2px solid #ffffff;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.5em;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
        }

        .header-nav {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .header-nav a {
            border: 1px solid rgba(0, 0, 0, 0.2);
            background-color: #ffffff;
            color: #111111;
            padding: 8px 14px;
            border-radius: 6px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.92em;
            font-weight: 600;
            text-decoration: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .header-nav a:hover {
            background-color: #f1f1f1;
            transform: translateY(-1px);
        }

        .header-buttons {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .header-buttons button {
            border: 1px solid rgba(0, 0, 0, 0.2);
            background-color: #ffffff;
            color: #111111;
            padding: 8px 16px;
            border-radius: 6px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .header-buttons button:hover {
            background-color: #f1f1f1;
            transform: translateY(-1px);
        }

        .color-picker {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            display: none;
            grid-template-columns: repeat(4, 34px);
            gap: 8px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
            z-index: 1000;
        }

        .color-picker.show {
            display: grid;
        }

        .color-option {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 2px solid #ffffff;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .color-option:hover {
            transform: scale(1.08);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        main h1 {
            font-size: 3em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .content-card {
            width: min(980px, 100%);
            margin-top: 24px;
            padding: 28px;
            border-radius: 18px;
            background-color: rgba(0, 0, 0, 0.22);
            backdrop-filter: blur(8px);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
        }

        .game-shell {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 24px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 14px;
            padding: 22px;
            box-shadow: 0 8px 26px rgba(0, 0, 0, 0.2);
        }

        .panel h2 {
            font-size: 1.4em;
            margin-bottom: 14px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .tower {
            text-align: center;
        }

        #towerBlocks {
            min-height: 320px;
            display: flex;
            flex-direction: column-reverse;
            justify-content: flex-start;
            align-items: center;
            padding: 10px 0;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
        }

        .block {
            width: 110px;
            height: 30px;
            margin: 5px auto;
            border-radius: 6px;
            border: 2px solid rgba(255, 255, 255, 0.45);
            background: linear-gradient(145deg, #38bdf8, #2563eb);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
        }

        .question {
            font-size: 1.4em;
            line-height: 1.5;
            margin-bottom: 18px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .answers {
            display: grid;
            gap: 10px;
        }

        .answers button {
            display: block;
            width: 100%;
            border: 1px solid rgba(0, 0, 0, 0.2);
            background-color: #ffffff;
            color: #111111;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .answers button:hover {
            background-color: #f1f1f1;
            transform: translateY(-1px);
        }

        .hint {
            margin-top: 14px;
            font-size: 0.95em;
            opacity: 0.9;
        }

        .progress {
            margin-bottom: 14px;
            font-size: 0.96em;
            opacity: 0.9;
        }

        .win-message {
            margin-top: 14px;
            padding: 14px;
            border-radius: 10px;
            font-weight: 600;
            display: none;
            background-color: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.35);
        }

        footer {
            background-color: rgba(0, 0, 0, 0.2);
            border-top: 2px solid #ffffff;
            text-align: center;
            padding: 18px;
            font-size: 0.9em;
        }

        @media (max-width: 860px) {
            .game-shell {
                grid-template-columns: 1fr;
            }

            #towerBlocks {
                min-height: 220px;
            }

            .question {
                font-size: 1.2em;
            }

            header {
                padding-top: 120px;
                padding-bottom: 72px;
            }

            .header-nav {
                left: 50%;
                top: 28px;
                transform: translateX(-50%);
            }

            .header-buttons {
                right: 50%;
                top: auto;
                bottom: 16px;
                transform: translateX(50%);
            }

            .color-picker {
                right: 50%;
                transform: translateX(50%);
            }

            main h1 {
                font-size: 2.3em;
                text-align: center;
            }

            .content-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-nav" aria-label="Page navigation">
            <a href="index.html">Home</a>
            <a href="#" id="backButton">Back</a>
        </div>
        <h1>Tower Quiz Game</h1>
        <div class="header-buttons">
            <button id="rainbowButton" type="button">Rainbow</button>
            <button id="colorsButton" type="button">Colors</button>
            <div id="colorPicker" class="color-picker" aria-label="Background color options">
                <button type="button" class="color-option" data-color="#ff0000" title="Red" style="background:#ff0000"></button>
                <button type="button" class="color-option" data-color="#ff7f00" title="Orange" style="background:#ff7f00"></button>
                <button type="button" class="color-option" data-color="#ffff00" title="Yellow" style="background:#ffff00"></button>
                <button type="button" class="color-option" data-color="#00ff00" title="Green" style="background:#00ff00"></button>
                <button type="button" class="color-option" data-color="#0000ff" title="Blue" style="background:#0000ff"></button>
                <button type="button" class="color-option" data-color="#4b0082" title="Indigo" style="background:#4b0082"></button>
                <button type="button" class="color-option" data-color="#9400d3" title="Violet" style="background:#9400d3"></button>
                <button type="button" class="color-option" data-color="#0f172a" title="Midnight" style="background:#0f172a"></button>
                <button type="button" class="color-option" data-color="#1e293b" title="Slate" style="background:#1e293b"></button>
                <button type="button" class="color-option" data-color="#14532d" title="Forest" style="background:#14532d"></button>
                <button type="button" class="color-option" data-color="#7f1d1d" title="Ruby" style="background:#7f1d1d"></button>
                <button type="button" class="color-option" data-color="#1e3a8a" title="Royal Blue" style="background:#1e3a8a"></button>
            </div>
        </div>
    </header>

    <main>
        <h1>Tower Quiz Challenge</h1>
        <section class="content-card" aria-label="Tower quiz game container">
            <div class="game-shell" aria-label="Tower quiz game area">
                <div class="panel tower">
                    <h2>Your Tower</h2>
                    <div id="towerBlocks"></div>
                    <p class="hint">Each correct answer adds a block. Wrong answers remove two blocks.</p>
                </div>
                <div class="panel questions">
                    <h2>Question</h2>
                    <p id="progressText" class="progress"></p>
                    <div id="question" class="question">Question will appear here</div>
                    <div id="answers" class="answers"></div>
                    <p id="completionMessage" class="win-message" role="status" aria-live="polite"></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Hello Everyone. All rights reserved.</p>
        <p>Author: 😊 Anish Mahajan 😊</p>
    </footer>

    <audio id="risingSound" src="rising.mp3"></audio>
    <audio id="crashSound" src="crash.mp3"></audio>

    <script>
        const body = document.body;
        const colorsButton = document.getElementById('colorsButton');
        const rainbowButton = document.getElementById('rainbowButton');
        const colorPicker = document.getElementById('colorPicker');
        const colorOptions = document.querySelectorAll('.color-option');
        const originalRainbow = 'linear-gradient(135deg, #FF0000 0%, #FF7F00 8%, #FFFF00 16%, #00FF00 24%, #0000FF 32%, #4B0082 40%, #9400D3 48%, #FF0000 56%, #FF7F00 64%, #FFFF00 72%, #00FF00 80%, #0000FF 88%, #4B0082 96%, #9400D3 100%)';

        const questions = [
            { question: "What is the capital of France?", correct: "Paris", answers: ["Paris", "Berlin", "Madrid", "Rome"] },
            { question: "What is 2 + 2?", correct: "4", answers: ["3", "4", "5", "6"] },
            { question: "What is the largest planet in our solar system?", correct: "Jupiter", answers: ["Mars", "Earth", "Jupiter", "Venus"] },
            { question: "Which language runs in a web browser?", correct: "JavaScript", answers: ["Python", "JavaScript", "C++", "Go"] },
            { question: "Which HTML tag makes the largest heading?", correct: "<h1>", answers: ["<heading>", "<h6>", "<head>", "<h1>"] },
            { question: "CSS stands for what?", correct: "Cascading Style Sheets", answers: ["Creative Style System", "Cascading Style Sheets", "Computer Styled Sections", "Colorful Style Syntax"] },
            { question: "What does HTTP stand for?", correct: "HyperText Transfer Protocol", answers: ["High Transfer Text Process", "HyperText Transfer Protocol", "Home Tool Transfer Path", "Hyper Transfer Text Program"] },
            { question: "How many days are in a leap year?", correct: "366", answers: ["365", "366", "364", "360"] },
            { question: "Which planet is known as the Red Planet?", correct: "Mars", answers: ["Mars", "Saturn", "Mercury", "Neptune"] },
            { question: "What gas do plants absorb from the atmosphere?", correct: "Carbon dioxide", answers: ["Oxygen", "Nitrogen", "Hydrogen", "Carbon dioxide"] },
            { question: "Who wrote 'Romeo and Juliet'?", correct: "William Shakespeare", answers: ["Charles Dickens", "William Shakespeare", "Jane Austen", "Mark Twain"] },
            { question: "What is the square root of 81?", correct: "9", answers: ["8", "9", "7", "6"] },
            { question: "Which ocean is the largest?", correct: "Pacific Ocean", answers: ["Atlantic Ocean", "Indian Ocean", "Pacific Ocean", "Arctic Ocean"] },
            { question: "What does CPU stand for?", correct: "Central Processing Unit", answers: ["Computer Performance Utility", "Central Processing Unit", "Core Program Unit", "Central Program Utility"] },
            { question: "Which symbol is used for IDs in CSS selectors?", correct: "#", answers: [".", "#", "*", "$"] },
            { question: "In Git, which command downloads and merges remote changes?", correct: "git pull", answers: ["git clone", "git merge", "git pull", "git init"] },
            { question: "Which continent has the most countries?", correct: "Africa", answers: ["Asia", "Europe", "Africa", "South America"] },
            { question: "What is the boiling point of water at sea level?", correct: "100°C", answers: ["90°C", "100°C", "80°C", "120°C"] },
            { question: "Which year has 29 days in February next after 2024?", correct: "2028", answers: ["2025", "2026", "2027", "2028"] },
            { question: "Which company created the Python language?", correct: "None; it was created by Guido van Rossum", answers: ["Google", "Microsoft", "None; it was created by Guido van Rossum", "IBM"] },
            { question: "Which data structure uses FIFO order?", correct: "Queue", answers: ["Stack", "Queue", "Tree", "Graph"] },
            { question: "Which HTML element is used for the main page content?", correct: "<main>", answers: ["<content>", "<section>", "<main>", "<article-main>"] },
            { question: "How many bits are in one byte?", correct: "8", answers: ["4", "8", "16", "32"] },
            { question: "Which keyword declares a constant in JavaScript?", correct: "const", answers: ["let", "var", "const", "final"] },
            { question: "What happens when all 25 questions are completed?", correct: "You win", answers: ["Game resets", "You lose", "You win", "Nothing happens"] }
        ];

        const towerBlocks = document.getElementById('towerBlocks');
        const questionDiv = document.getElementById('question');
        const answersDiv = document.getElementById('answers');
        const progressText = document.getElementById('progressText');
        const completionMessage = document.getElementById('completionMessage');
        const risingSound = document.getElementById('risingSound');
        const crashSound = document.getElementById('crashSound');
        const backButton = document.getElementById('backButton');

        let currentQuestionIndex = 0;

        function setSolidBackground(color) {
            body.style.animation = 'none';
            body.style.backgroundImage = 'none';
            body.style.backgroundColor = color;
        }

        function setRainbowBackground() {
            body.style.background = originalRainbow;
            body.style.backgroundSize = '200% 200%';
            body.style.backgroundPosition = '0% 0%';
            body.style.animation = 'waveFlow 8s ease-in-out infinite';
        }

        function loadQuestion() {
            if (currentQuestionIndex >= questions.length) {
                showWinMessage();
                return;
            }

            const currentQuestion = questions[currentQuestionIndex];
            progressText.textContent = 'Question ' + (currentQuestionIndex + 1) + ' of ' + questions.length;
            questionDiv.textContent = currentQuestion.question;
            answersDiv.innerHTML = '';
            completionMessage.style.display = 'none';

            currentQuestion.answers.forEach(answer => {
                const button = document.createElement('button');
                button.textContent = answer;
                button.addEventListener('click', () => checkAnswer(answer));
                answersDiv.appendChild(button);
            });
        }

        function checkAnswer(selectedAnswer) {
            const currentQuestion = questions[currentQuestionIndex];

            if (selectedAnswer === currentQuestion.correct) {
                addBlock();
                playRisingSound();
            } else {
                removeBlocks();
                playCrashSound();
            }

            currentQuestionIndex += 1;
            loadQuestion();
        }

        function addBlock() {
            const block = document.createElement('div');
            block.className = 'block';
            towerBlocks.appendChild(block);
        }

        function removeBlocks() {
            for (let i = 0; i < 2; i++) {
                if (towerBlocks.children.length > 0) {
                    towerBlocks.removeChild(towerBlocks.lastElementChild);
                }
            }
        }

        function playRisingSound() {
            risingSound.volume = Math.min(1, towerBlocks.children.length * 0.1);
            risingSound.currentTime = 0;
            risingSound.play();
        }

        function playCrashSound() {
            crashSound.currentTime = 0;
            crashSound.play();
        }

        function showWinMessage() {
            progressText.textContent = 'Completed: ' + questions.length + ' of ' + questions.length;
            questionDiv.textContent = 'You win! You completed all 25 questions.';
            answersDiv.innerHTML = '';
            completionMessage.textContent = 'Great job! Your tower challenge is complete.';
            completionMessage.style.display = 'block';
        }

        colorsButton.addEventListener('click', function () {
            colorPicker.classList.toggle('show');
        });

        rainbowButton.addEventListener('click', function () {
            colorPicker.classList.remove('show');
            setRainbowBackground();
        });

        colorOptions.forEach(function (option) {
            option.addEventListener('click', function () {
                const selectedColor = option.getAttribute('data-color');
                setSolidBackground(selectedColor);
                colorPicker.classList.remove('show');
            });
        });

        document.addEventListener('click', function (event) {
            if (!colorPicker.contains(event.target) && event.target !== colorsButton) {
                colorPicker.classList.remove('show');
            }
        });

        backButton.addEventListener('click', function (event) {
            event.preventDefault();
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = 'index.html';
            }
        });

        loadQuestion();
    </script>
</body>
</html>
