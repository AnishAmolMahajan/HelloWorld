<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        @keyframes waveFlow {
            0% {
                background: linear-gradient(135deg, #FF0000 0%, #FF7F00 12%, #FFFF00 24%, #00FF00 36%, #0000FF 48%, #4B0082 60%, #9400D3 72%, #FF0000 84%, #FF7F00 100%);
            }
            25% {
                background: linear-gradient(135deg, #FF7F00 0%, #FFFF00 12%, #00FF00 24%, #0000FF 36%, #4B0082 48%, #9400D3 60%, #FF0000 72%, #FF7F00 84%, #FFFF00 100%);
            }
            50% {
                background: linear-gradient(135deg, #FFFF00 0%, #00FF00 12%, #0000FF 24%, #4B0082 36%, #9400D3 48%, #FF0000 60%, #FF7F00 72%, #FFFF00 84%, #00FF00 100%);
            }
            75% {
                background: linear-gradient(135deg, #00FF00 0%, #0000FF 12%, #4B0082 24%, #9400D3 36%, #FF0000 48%, #FF7F00 60%, #FFFF00 72%, #00FF00 84%, #0000FF 100%);
            }
            100% {
                background: linear-gradient(135deg, #FF0000 0%, #FF7F00 12%, #FFFF00 24%, #00FF00 36%, #0000FF 48%, #4B0082 60%, #9400D3 72%, #FF0000 84%, #FF7F00 100%);
            }
        }
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: linear-gradient(135deg, #FF0000 0%, #FF7F00 12%, #FFFF00 24%, #00FF00 36%, #0000FF 48%, #4B0082 60%, #9400D3 72%, #FF0000 84%, #FF7F00 100%);
            font-family: Georgia, serif;
            animation: waveFlow 6s ease-in-out infinite;
        }
        header {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid white;
        }
        header h1 {
            color: white;
            font-size: 1.5em;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
        }
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        main h1 {
            color: white;
            font-size: 3em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        footer {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 20px;
            text-align: center;
            border-top: 2px solid white;
            color: white;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Website</h1>
    </header>
    <main>
        <h1>Hello World</h1>
    </main>
    <footer>
        <p>&copy; 2026 Hello World. All rights reserved.</p>
        <p>Author: 😊 Anish Mahajan 😊</p>
    </footer>
</body>
</html>
