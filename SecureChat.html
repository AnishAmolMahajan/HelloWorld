<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        @keyframes waveFlow {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: linear-gradient(135deg,
                #FF0000 0%, #FF7F00 8%, #FFFF00 16%, #00FF00 24%,
                #0000FF 32%, #4B0082 40%, #9400D3 48%, #FF0000 56%,
                #FF7F00 64%, #FFFF00 72%, #00FF00 80%, #0000FF 88%,
                #4B0082 96%, #9400D3 100%);
            background-size: 200% 200%;
            font-family: 'Poppins', sans-serif;
            animation: waveFlow 8s ease-in-out infinite;
        }
        header {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid white;
        }
        header h1 {
            color: white;
            font-size: 1.5em;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
        }
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }
        .card {
            width: min(900px, 100%);
            border-radius: 18px;
            background-color: rgba(0, 0, 0, 0.24);
            backdrop-filter: blur(8px);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
            color: white;
            padding: 24px;
        }
        .card h2 {
            margin-bottom: 14px;
        }
        .login-form, .chat-panel {
            display: grid;
            gap: 10px;
        }
        .hidden {
            display: none;
        }
        input, textarea {
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 10px;
            padding: 10px 12px;
            font-family: inherit;
            background: rgba(0, 0, 0, 0.2);
            color: white;
        }
        textarea {
            min-height: 80px;
            resize: vertical;
        }
        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            border: none;
            border-radius: 999px;
            padding: 10px 18px;
            font-family: inherit;
            cursor: pointer;
        }
        .primary {
            background: white;
            color: #222;
        }
        .secondary {
            background: rgba(255, 255, 255, 0.16);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .status {
            min-height: 24px;
            color: #fff3c4;
        }
        .history {
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            min-height: 240px;
            max-height: 360px;
            overflow-y: auto;
            padding: 12px;
        }
        .entry {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            white-space: pre-wrap;
        }
        .meta {
            font-size: 0.8em;
            opacity: 0.8;
            margin-top: 4px;
        }
        .back-link {
            margin-top: 10px;
        }
        .back-link a {
            color: white;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.12);
        }
    </style>
</head>
<body>
    <header>
        <h1>Secure Chat</h1>
    </header>
    <main>
        <section class="card">
            <div id="login-view" class="login-form">
                <h2>Login</h2>
                <p>Enter your name and fixed password.</p>
                <input id="name" type="text" placeholder="Name">
                <input id="password" type="password" placeholder="Password">
                <div class="buttons">
                    <button id="login-btn" class="primary" type="button">Login</button>
                </div>
                <div id="status" class="status"></div>
            </div>

            <div id="chat-view" class="chat-panel hidden">
                <h2 id="chat-title">Chat</h2>
                <div id="history" class="history"></div>
                <textarea id="message" placeholder="Type your message..."></textarea>
                <div class="buttons">
                    <button id="send-btn" class="primary" type="button">Send</button>
                    <button id="refresh-btn" class="secondary" type="button">Refresh</button>
                    <button id="logout-btn" class="secondary" type="button">Logout</button>
                </div>
                <div id="chat-status" class="status"></div>
            </div>

            <div class="back-link">
                <a href="index.html">← Back to Home</a>
            </div>
        </section>
    </main>

    <script>
        const loginView = document.getElementById('login-view');
        const chatView = document.getElementById('chat-view');
        const nameInput = document.getElementById('name');
        const passwordInput = document.getElementById('password');
        const statusEl = document.getElementById('status');
        const chatStatusEl = document.getElementById('chat-status');
        const chatTitle = document.getElementById('chat-title');
        const historyEl = document.getElementById('history');
        const messageInput = document.getElementById('message');

        let currentName = '';
        let currentPassword = '';

        async function postJson(url, body) {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.error || 'Request failed');
            }
            return data;
        }

        function renderHistory(history) {
            historyEl.innerHTML = '';
            if (!history.length) {
                historyEl.innerHTML = '<div class="entry">No messages yet.</div>';
                return;
            }
            history.forEach((item) => {
                const entry = document.createElement('div');
                entry.className = 'entry';
                const time = new Date(item.timestamp).toLocaleString();
                entry.textContent = item.message;
                const meta = document.createElement('div');
                meta.className = 'meta';
                meta.textContent = item.sender + ' • ' + time;
                entry.appendChild(meta);
                historyEl.appendChild(entry);
            });
            historyEl.scrollTop = historyEl.scrollHeight;
        }

        async function loadHistory() {
            const result = await postJson('/api/history', {
                name: currentName,
                password: currentPassword
            });
            renderHistory(result.history || []);
        }

        async function login() {
            const name = nameInput.value.trim();
            const password = passwordInput.value.trim();
            if (!name || !password) {
                statusEl.textContent = 'Name and password are required.';
                return;
            }
            statusEl.textContent = 'Signing in...';
            try {
                await postJson('/api/login', { name, password });
                currentName = name;
                currentPassword = password;
                chatTitle.textContent = 'Chat - ' + currentName;
                loginView.classList.add('hidden');
                chatView.classList.remove('hidden');
                statusEl.textContent = '';
                await loadHistory();
                chatStatusEl.textContent = 'Logged in successfully.';
            } catch (error) {
                statusEl.textContent = error.message;
            }
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) {
                chatStatusEl.textContent = 'Message cannot be empty.';
                return;
            }
            chatStatusEl.textContent = 'Sending...';
            try {
                const result = await postJson('/api/message', {
                    name: currentName,
                    password: currentPassword,
                    message
                });
                messageInput.value = '';
                renderHistory(result.history || []);
                chatStatusEl.textContent = 'Message saved.';
            } catch (error) {
                chatStatusEl.textContent = error.message;
            }
        }

        function logout() {
            currentName = '';
            currentPassword = '';
            loginView.classList.remove('hidden');
            chatView.classList.add('hidden');
            historyEl.innerHTML = '';
            messageInput.value = '';
            chatStatusEl.textContent = '';
            statusEl.textContent = 'Logged out.';
        }

        document.getElementById('login-btn').addEventListener('click', login);
        document.getElementById('send-btn').addEventListener('click', sendMessage);
        document.getElementById('refresh-btn').addEventListener('click', loadHistory);
        document.getElementById('logout-btn').addEventListener('click', logout);
    </script>
</body>
</html>
